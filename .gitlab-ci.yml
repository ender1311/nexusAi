# Nexus CI — verify (parallel) → build (main only)

default:
  image: oven/bun:1-alpine@sha256:5acc90a93e91ff07bf72aa90a7c9f0fa189765aec90b47bdbf2152d2196383c0
  interruptible: true

variables:
  BUN_INSTALL_CACHE_DIR: .bun/install/cache
  HUSKY: "0"

cache:
  key: bun-$CI_COMMIT_REF_SLUG
  paths:
    - .bun/install/cache

stages:
  - verify
  - build

verify:typecheck:
  stage: verify
  script:
    - bun install --frozen-lockfile
    - bunx prisma generate
    - bun run typecheck

verify:lint:
  stage: verify
  variables:
    NODE_OPTIONS: --max-old-space-size=512
  script:
    - bun install --frozen-lockfile
    - bun run lint

verify:test:quick:
  stage: verify
  variables:
    NODE_OPTIONS: --max-old-space-size=512
  script:
    - bun install --frozen-lockfile
    - bunx prisma generate
    - bun run test:quick

build:
  stage: build
  needs: [verify:typecheck, verify:lint, verify:test:quick]
  only:
    - main
  variables:
    NODE_OPTIONS: --max-old-space-size=1536
  script:
    - bun install --frozen-lockfile
    - bunx prisma generate
    - bun run build
